<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobuki Inoue / Kinoya</title>
    <style>
        /* 全体のリセットと背景設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f0ea; /* 温かみのある明るい背景色 */
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 50px 20px;
        }

        /* コンテナの幅制限 */
        .container {
            width: 100%;
            max-width: 540px;
            text-align: center;
        }

        /* プロフィール（上部画像並び）部分 */
        .profile {
            margin-bottom: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 画像を横並びにするラッパー */
        .profile-images {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            justify-content: center;
            align-items: center;
        }

        /* アバターのスタイル */
        .img-avatar {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border: 2px solid #dcd7ce;
            border-radius: 50%;
        }

        /* Kinoyaロゴのスタイル */
        .img-logo {
            width: 96px;
            height: 96px;
            object-fit: contain;
            background-color: transparent;
        }

        .profile-name {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .profile-bio {
            font-size: 0.9rem;
            color: #666666;
            line-height: 1.6;
        }

        /* リンクの一覧 */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* リンクボタンのスタイル */
        .link-item {
            display: block;
            background-color: #ffffff; /* 通常時はクリーンな白 */
            color: #444444;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid #e1dacb; /* 背景に馴染む淡いベージュの枠線 */
            transition: all 0.25s ease;
            cursor: pointer;
        }

        /* ホバー時のエフェクト（明るさをキープしたまま変化） */
        @media (hover: hover) {
            .link-item:hover {
                background-color: #eae3d5; /* 背景よりほんの少し濃いベージュにして「押せる感」を演出 */
                color: #1a1a1a;
                border-color: #c4b9a3; /* 枠線も少しだけくっきりと */
                transform: translateY(-2px);
                box-shadow: 0 6px 14px rgba(140, 130, 115, 0.08); /* 柔らかい影 */
            }
        }

        /* タップ時のエフェクト（スマホ用） */
        .link-item:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- プロフィール部 -->
        <div class="profile">
            <!-- アバターとKinoyaロゴの横並びエリア -->
            <div class="profile-images">
                <!-- パスを images/ に変更 -->
                <img src="images/avatar.png" alt="Nobuki Inoue" class="img-avatar" onerror="this.style.display='none';">
                <img src="images/kinoya.svg" alt="Kinoya" class="img-logo" onerror="this.style.display='none';">
            </div>

            <h1 class="profile-name">Nobuki Inoue / Kinoya</h1>
            <p class="profile-bio">DIY🪚とゲーム🎮が好きなプログラマー。<br />CNCでキーボードの木製ケースなどを作ってます。</p>
        </div>

        <!-- リンク集 -->
        <div class="links-list">

            <a href="https://x.com/black_trooper" class="link-item" target="_blank" rel="noopener noreferrer">
                X (Twitter)
            </a>

            <a href="https://kinoya.booth.pm/" class="link-item" target="_blank" rel="noopener noreferrer">
                Kinoya (BOOTH)
            </a>

            <a href="https://note.com/black_trooper" class="link-item" target="_blank" rel="noopener noreferrer">
                note
            </a>

            <a href="https://github.com/black-trooper" class="link-item" target="_blank" rel="noopener noreferrer">
                GitHub
            </a>

            <a href="https://www.amazon.co.jp/hz/wishlist/ls/1X9NJAJ18H1UB" class="link-item" target="_blank"
                rel="noopener noreferrer">
                Amazon Wishlist
            </a>

        </div>
    </div>

</body>

</html>
